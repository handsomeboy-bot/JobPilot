{% extends "base.html" %}
{% block title %}忘记密码 — JobPilot{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>🔐 忘记密码</h2>
        <p class="auth-sub" id="stepHint">输入注册邮箱，获取验证码</p>

        <!-- Step 1: 输入邮箱 -->
        <div id="stepEmail">
            <div class="form-group">
                <label for="resetEmail">注册邮箱</label>
                <input type="email" id="resetEmail" placeholder="your@email.com">
            </div>
            <button type="button" class="btn btn-primary btn-block" id="sendBtn" onclick="sendCode()">📨 发送验证码</button>
        </div>

        <!-- Step 2: 输入验证码+新密码 -->
        <div id="stepReset" style="display:none;">
            <p style="font-size:.85rem;color:#166534;margin-bottom:8px;">✅ 验证码已发送到 <b id="sentToEmail"></b></p>
            <div class="form-group">
                <label for="verifyCode">6位数验证码</label>
                <input type="text" id="verifyCode" placeholder="输入邮件中的验证码"
                       style="font-size:1.2rem;letter-spacing:4px;text-align:center;"
                       maxlength="6" inputmode="numeric">
            </div>
            <div class="form-group">
                <label for="newPassword">新密码</label>
                <input type="password" id="newPassword" placeholder="至少6位" minlength="6">
            </div>
            <div class="form-group">
                <label for="newPassword2">确认新密码</label>
                <input type="password" id="newPassword2" placeholder="再输入一次" minlength="6">
            </div>
            <div class="form-error" id="resetError"></div>
            <button type="button" class="btn btn-primary btn-block" id="resetBtn" onclick="doReset()">重置密码</button>
        </div>

        <p class="auth-footer" style="margin-top:16px;">
            <a href="/login">← 返回登录</a>
        </p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function sendCode() {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) { alert('请输入邮箱'); return; }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true; btn.textContent = '发送中...';

    try {
        const r = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
        });
        const d = await r.json();
        if (d.ok) {
            document.getElementById('sentToEmail').textContent = email;
            document.getElementById('stepEmail').style.display = 'none';
            document.getElementById('stepReset').style.display = 'block';
            document.getElementById('stepHint').textContent = '输入验证码并设置新密码';
            if (d.code) {
                document.getElementById('verifyCode').value = d.code;
                document.getElementById('verifyCode').type = 'text';
            }
            if (!d.mail_sent) {
                document.getElementById('stepHint').textContent += '（邮件发送失败，验证码直接显示在下方）';
            }
        } else {
            alert(d.msg);
        }
    } catch (e) {
        alert('网络错误');
    }
    btn.disabled = false; btn.textContent = '📨 发送验证码';
}

async function doReset() {
    const email = document.getElementById('resetEmail').value.trim();
    const code = document.getElementById('verifyCode').value.trim();
    const pw = document.getElementById('newPassword').value;
    const pw2 = document.getElementById('newPassword2').value;
    const err = document.getElementById('resetError');

    if (!code || code.length < 6) { err.textContent = '请输入6位验证码'; return; }
    if (pw.length < 6) { err.textContent = '新密码至少6位'; return; }
    if (pw !== pw2) { err.textContent = '两次密码不一致'; return; }

    const btn = document.getElementById('resetBtn');
    btn.disabled = true; btn.textContent = '重置中...'; err.textContent = '';

    try {
        const r = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code, new_password: pw }),
        });
        const d = await r.json();
        if (d.ok) {
            alert('密码重置成功！请登录');
            window.location.href = '/login';
        } else {
            err.textContent = d.msg;
        }
    } catch (e) {
        err.textContent = '网络错误';
    }
    btn.disabled = false; btn.textContent = '重置密码';
}
</script>
{% endblock %}

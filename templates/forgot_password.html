{% extends "base.html" %}
{% block title %}忘记密码 — JobPilot{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>🔐 忘记密码</h2>
        <p class="auth-sub">输入注册邮箱并设置新密码</p>

        <form id="resetForm" onsubmit="doReset(event)">
            <div class="form-group">
                <label for="resetEmail">注册邮箱</label>
                <input type="email" id="resetEmail" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="newPassword">新密码</label>
                <input type="password" id="newPassword" required placeholder="至少6位" minlength="6">
            </div>
            <div class="form-group">
                <label for="newPassword2">确认新密码</label>
                <input type="password" id="newPassword2" required placeholder="再输入一次" minlength="6">
            </div>
            <div class="form-error" id="resetError"></div>
            <button type="submit" class="btn btn-primary btn-block">重置密码</button>
        </form>

        <p class="auth-footer" style="margin-top:16px;">
            <a href="/login">← 返回登录</a>
        </p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function doReset(e) {
    e.preventDefault();
    const email = document.getElementById('resetEmail').value.trim();
    const pw = document.getElementById('newPassword').value;
    const pw2 = document.getElementById('newPassword2').value;
    const err = document.getElementById('resetError');
    const btn = e.target.querySelector('button[type="submit"]');

    if (!email) { err.textContent = '请输入注册邮箱'; return; }
    if (pw.length < 6) { err.textContent = '新密码至少6位'; return; }
    if (pw !== pw2) { err.textContent = '两次密码不一致'; return; }

    btn.disabled = true; btn.textContent = '重置中...'; err.textContent = '';

    try {
        const r = await fetch('/api/auth/reset-password-direct', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, new_password: pw }),
        });
        const d = await r.json();
        if (d.ok) {
            alert('密码重置成功！请登录');
            window.location.href = '/login';
        } else {
            err.textContent = d.msg;
        }
    } catch (e) {
        err.textContent = '网络错误';
    }
    btn.disabled = false; btn.textContent = '重置密码';
}
</script>
{% endblock %}

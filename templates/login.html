{% extends "base.html" %}
{% block title %}登录 — JobPilot{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>👋 欢迎回来</h2>
        <p class="auth-sub">登录你的 JobPilot 账号</p>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" required autofocus placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required placeholder="••••••">
            </div>
            <div class="form-error" id="loginError"></div>
            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">登录</button>
            <p style="text-align:right;margin-top:8px;"><a href="/forgot-password" style="font-size:.85rem;color:var(--text-muted);">忘记密码？</a></p>
        </form>
        <p class="auth-footer">还没有账号？<a href="/register">立即注册 →</a></p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    btn.disabled = true; btn.textContent = '登录中...'; err.textContent = '';

    const form = new FormData();
    form.append('email', document.getElementById('email').value);
    form.append('password', document.getElementById('password').value);

    try {
        const r = await fetch('/api/auth/login', { method: 'POST', body: form });
        const data = await r.json();
        if (data.ok) {
            window.location.href = '/app';
        } else {
            err.textContent = data.msg;
        }
    } catch (e) {
        err.textContent = '网络错误，请重试';
    }
    btn.disabled = false; btn.textContent = '登录';
}
</script>
{% endblock %}

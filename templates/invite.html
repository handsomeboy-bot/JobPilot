{% extends "base.html" %}
{% block title %}验证邀请码 — JobPilot{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>📨 验证邀请码</h2>
        <p class="auth-sub">输入邮箱获取专属邀请码，60秒内查收邮件</p>

        <!-- 未发送邀请码时 -->
        <div id="stepEmail">
            <div class="form-group">
                <label for="inviteEmail">邮箱</label>
                <input type="email" id="inviteEmail" placeholder="your@email.com">
            </div>
            <button type="button" class="btn btn-primary btn-block" onclick="requestInvite()">📨 获取邀请码</button>
        </div>

        <!-- 倒计时 -->
        <div id="stepCountdown" style="display:none;text-align:center;">
            <p style="font-size:.9rem;color:#166534;margin-bottom:4px;">✅ 邀请码已发送到</p>
            <p style="font-weight:600;color:#166534;margin-bottom:12px;" id="sentEmail"></p>
            <div style="position:relative;display:inline-block;margin-bottom:12px;">
                <svg width="80" height="80" viewBox="0 0 80 80">
                    <circle cx="40" cy="40" r="36" fill="none" stroke="#E2E8F0" stroke-width="4"/>
                    <circle cx="40" cy="40" r="36" fill="none" stroke="var(--primary)" stroke-width="4"
                            stroke-dasharray="226" stroke-dashoffset="0" id="countdownCircle"
                            transform="rotate(-90 40 40)" stroke-linecap="round"/>
                </svg>
                <span style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:var(--primary);" id="countdownText">60</span>
            </div>
            <p style="font-size:.78rem;color:#64748B;margin-bottom:16px;">秒后可以重新发送</p>

            <button type="button" class="btn btn-outline btn-block" id="resendBtn" onclick="resendInvite()" disabled>
                🔄 重新发送邀请码
            </button>
        </div>

        <!-- 输入邀请码完成注册 -->
        <hr style="margin:20px 0;border-color:var(--border);">
        <div id="stepVerify">
            <div class="form-group">
                <label for="verifyCode">邀请码</label>
                <input type="text" id="verifyCode" placeholder="输入邮件中的邀请码"
                       style="width:100%;font-size:1.1rem;letter-spacing:2px;text-transform:uppercase;">
            </div>
            <div class="form-error" id="verifyError"></div>
            <button type="button" class="btn btn-primary btn-block" id="verifyBtn" onclick="doVerify()">完成注册</button>
        </div>

        <p class="auth-footer" style="margin-top:16px;"><a href="/register">← 返回修改注册信息</a></p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let countdownTimer = null;
let countdownSec = 0;

// 页面加载时恢复注册信息
const regUsername = sessionStorage.getItem('reg_username');
const regPassword = sessionStorage.getItem('reg_password');
if (!regUsername || !regPassword) {
    // 没有暂存信息，回到注册页
    window.location.href = '/register';
}

// 检查 URL 是否带了邀请码（邮件链接直达）
const urlParams = new URLSearchParams(window.location.search);
const codeFromUrl = urlParams.get('code');
if (codeFromUrl) {
    document.getElementById('verifyCode').value = codeFromUrl;
}

function requestInvite() {
    const email = document.getElementById('inviteEmail').value.trim();
    if (!email) { alert('请输入邮箱'); return; }

    const btn = document.querySelector('#stepEmail .btn');
    btn.disabled = true; btn.textContent = '发送中...';

    fetch('/api/auth/request-invite', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
    }).then(r => r.json()).then(d => {
        if (d.ok) {
            document.getElementById('sentEmail').textContent = email;
            document.getElementById('stepEmail').style.display = 'none';
            document.getElementById('stepCountdown').style.display = 'block';
            // 邮件发送失败时，直接在页面显示验证码
            if (d.code && !d.mail_sent) {
                document.getElementById('verifyCode').value = d.code;
                document.getElementById('verifyCode').type = 'text';
                const hint = document.createElement('p');
                hint.style.cssText = 'color:#166534;font-size:.85rem;margin-top:8px;';
                hint.textContent = '✅ 邀请码已显示在下方输入框中，直接复制使用';
                document.getElementById('stepCountdown').appendChild(hint);
            }
            startCountdown();
        } else {
            alert(d.msg);
        }
        btn.disabled = false; btn.textContent = '📨 获取邀请码';
    }).catch(() => {
        alert('网络错误，请重试');
        btn.disabled = false; btn.textContent = '📨 获取邀请码';
    });
}

function resendInvite() {
    const email = document.getElementById('sentEmail').textContent;
    if (!email) return;

    const btn = document.getElementById('resendBtn');
    btn.disabled = true; btn.textContent = '重新发送中...';

    fetch('/api/auth/request-invite', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
    }).then(r => r.json()).then(d => {
        alert(d.msg);
        if (d.ok) startCountdown();
        btn.disabled = false; btn.textContent = '🔄 重新发送邀请码';
    });
}

function startCountdown() {
    clearInterval(countdownTimer);
    countdownSec = 60;
    const circle = document.getElementById('countdownCircle');
    const text = document.getElementById('countdownText');
    const btn = document.getElementById('resendBtn');
    const totalDash = 226; // 2*PI*36 ≈ 226

    circle.style.strokeDashoffset = '0';
    text.textContent = countdownSec;
    btn.disabled = true;

    countdownTimer = setInterval(() => {
        countdownSec--;
        text.textContent = countdownSec;
        circle.style.strokeDashoffset = totalDash * (1 - countdownSec / 60);

        if (countdownSec <= 0) {
            clearInterval(countdownTimer);
            btn.disabled = false;
            text.textContent = '0';
            circle.style.strokeDashoffset = totalDash;
        }
    }, 1000);
}

async function doVerify() {
    const code = document.getElementById('verifyCode').value.trim();
    const err = document.getElementById('verifyError');
    const btn = document.getElementById('verifyBtn');

    if (!code) { err.textContent = '请输入邀请码'; return; }

    btn.disabled = true; btn.textContent = '验证中...'; err.textContent = '';

    // 获取邀请码对应的邮箱
    const form = new FormData();
    form.append('username', regUsername);
    form.append('password', regPassword);
    form.append('invite_code', code);

    try {
        const r = await fetch('/api/auth/register-with-invite', { method: 'POST', body: form });
        const data = await r.json();
        if (data.ok) {
            sessionStorage.removeItem('reg_username');
            sessionStorage.removeItem('reg_password');
            window.location.href = '/app';
        } else {
            err.textContent = data.msg;
        }
    } catch (e) {
        err.textContent = '网络错误，请重试';
    }
    btn.disabled = false; btn.textContent = '完成注册';
}
</script>
{% endblock %}
